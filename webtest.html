<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internet Café Registration</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="w-full max-w-md bg-white shadow-lg rounded-2xl p-8">
    <h2 class="text-2xl font-bold text-center mb-6 text-blue-700">Internet Ram Registration</h2>

    <form action="register.php" method="POST" class="space-y-4">
      
      <!-- Full Name -->
      <div>
        <label class="block text-gray-700 font-semibold">Full Name</label>
        <input type="text" name="name" required 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-gray-700 font-semibold">Email</label>
        <input type="email" name="email" required 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Phone -->
      <div>
        <label class="block text-gray-700 font-semibold">Phone</label>
        <input type="text" name="phone" required 
               class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
      </div>

      <!-- Package Selection -->
      <div>
        <label class="block text-gray-700 font-semibold">Choose Package</label>
        <select name="package" required 
                class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-400">
          <option value="">-- Select Package --</option>
          <option value="1hr">1 Hour</option>
          <option value="3hr">3 Hours</option>
          <option value="1day">1 Day Pass</option>
          <option value="weekly">Weekly Pass</option>
          <option value="monthly">Monthly Pass</option>
        </select>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
          Register Now
        </button>
      </div>

    </form>
  </div>

</body>
</html>
